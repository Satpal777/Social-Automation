services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linkedin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linkedin}
      POSTGRES_DB: ${POSTGRES_DB:-linkedin}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linkedin}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data: {}
